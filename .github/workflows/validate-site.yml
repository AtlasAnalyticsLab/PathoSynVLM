name: PathoSynVLM website checks

on:
  push:
    branches:
      - gh-pages
  pull_request:
    branches:
      - gh-pages

permissions:
  contents: read

concurrency:
  group: pathosynvlm-website-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check PathoSynVLM static site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out PathoSynVLM website branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check HTML, links, metadata, and assets
        run: python3 scripts/validate_site.py .
