name: PathoSynVLM website

on:
  push:
    branches:
      - gh-pages
  pull_request:
    branches:
      - gh-pages

permissions:
  contents: read

concurrency:
  group: pathosynvlm-website-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Check PathoSynVLM static site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out PathoSynVLM website branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check HTML, links, metadata, and assets
        run: python3 scripts/validate_site.py .

  deploy:
    name: Deploy PathoSynVLM website
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out PathoSynVLM website branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Stage public website files
        run: |
          mkdir _site
          cp index.html 404.html robots.txt sitemap.xml .nojekyll _site/
          cp -R static _site/static

      - name: Upload PathoSynVLM website
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy PathoSynVLM website
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  cleanup-history:
    name: Remove superseded Actions history
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[cleanup-actions-history]')
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Delete superseded workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          run_ids=(
            29209982046 29209981398
            29209507002 29209506615
            29208562510 29208561906
            29207983341 29206801793 29206800450
          )

          for run_id in "${run_ids[@]}"; do
            status=$(curl --silent --show-error --location \
              --output /tmp/delete-run-response \
              --write-out "%{http_code}" \
              --request DELETE \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/actions/runs/${run_id}")

            if [[ "${status}" != "204" && "${status}" != "404" ]]; then
              cat /tmp/delete-run-response
              echo "Failed to delete workflow run ${run_id}: HTTP ${status}" >&2
              exit 1
            fi
          done

      - name: Disable superseded workflow registrations
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          workflow_ids=(311857124 311857109)

          for workflow_id in "${workflow_ids[@]}"; do
            status=$(curl --silent --show-error --location \
              --output /tmp/disable-workflow-response \
              --write-out "%{http_code}" \
              --request PUT \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/actions/workflows/${workflow_id}/disable")

            if [[ "${status}" != "204" && "${status}" != "404" ]]; then
              cat /tmp/disable-workflow-response
              echo "GitHub did not disable workflow ${workflow_id}: HTTP ${status}" >&2
            fi
          done
