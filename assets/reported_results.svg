<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">PathoSynVLM reported metrics</title>
  <desc id="desc">Headline Stage 1 and Stage 2 metrics reported for PathoSynVLM.</desc>
  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="560" rx="28" fill="#f8fafc"/>
  <rect x="28" y="28" width="1224" height="504" rx="24" fill="#ffffff" stroke="#dbe4ee"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="82" font-size="34" font-weight="800" fill="#0f172a">Reported Results</text>
    <text x="72" y="113" font-size="17" fill="#475569">Main values from the paper. BLEU is shown in paper scale, not sacreBLEU percentage.</text>

    <rect x="72" y="150" width="535" height="318" rx="18" fill="#f8fafc" stroke="#dbe4ee" filter="url(#softShadow)"/>
    <text x="108" y="198" font-size="23" font-weight="800" fill="#0f172a">Stage 1 Alignment</text>
    <text x="108" y="224" font-size="14" fill="#64748b">HistGen + REG2025, aligner-only training</text>

    <g font-size="16" fill="#0f172a">
      <text x="108" y="276" font-weight="700">ROUGE-L</text>
      <rect x="250" y="257" width="260" height="22" rx="11" fill="#dbeafe"/>
      <rect x="250" y="257" width="247" height="22" rx="11" fill="#2563eb"/>
      <text x="528" y="276" text-anchor="end" font-weight="800">0.4743</text>

      <text x="108" y="326" font-weight="700">METEOR</text>
      <rect x="250" y="307" width="260" height="22" rx="11" fill="#dcfce7"/>
      <rect x="250" y="307" width="250" height="22" rx="11" fill="#16a34a"/>
      <text x="528" y="326" text-anchor="end" font-weight="800">0.4810</text>

      <text x="108" y="376" font-weight="700">BLEU-4</text>
      <rect x="250" y="357" width="260" height="22" rx="11" fill="#ffedd5"/>
      <rect x="250" y="357" width="65" height="22" rx="11" fill="#ea580c"/>
      <text x="528" y="376" text-anchor="end" font-weight="800">0.1247</text>

      <text x="108" y="426" font-weight="700">BERTScore F1</text>
      <rect x="250" y="407" width="260" height="22" rx="11" fill="#f3e8ff"/>
      <rect x="250" y="407" width="221" height="22" rx="11" fill="#9333ea"/>
      <text x="528" y="426" text-anchor="end" font-weight="800">0.4253</text>
    </g>

    <rect x="673" y="150" width="535" height="318" rx="18" fill="#f8fafc" stroke="#dbe4ee" filter="url(#softShadow)"/>
    <text x="709" y="198" font-size="23" font-weight="800" fill="#0f172a">Stage 2 HISTAI</text>
    <text x="709" y="224" font-size="14" fill="#64748b">Case-level structured report generation</text>

    <g font-size="16" fill="#0f172a">
      <text x="709" y="270" font-weight="700">ROUGE-L</text>
      <rect x="875" y="251" width="220" height="20" rx="10" fill="#dbeafe"/>
      <rect x="875" y="251" width="110" height="20" rx="10" fill="#2563eb"/>
      <text x="1128" y="270" text-anchor="end" font-weight="800">0.2495</text>

      <text x="709" y="312" font-weight="700">METEOR</text>
      <rect x="875" y="293" width="220" height="20" rx="10" fill="#dcfce7"/>
      <rect x="875" y="293" width="88" height="20" rx="10" fill="#16a34a"/>
      <text x="1128" y="312" text-anchor="end" font-weight="800">0.1988</text>

      <text x="709" y="354" font-weight="700">BLEU-4</text>
      <rect x="875" y="335" width="220" height="20" rx="10" fill="#ffedd5"/>
      <rect x="875" y="335" width="24" height="20" rx="10" fill="#ea580c"/>
      <text x="1128" y="354" text-anchor="end" font-weight="800">0.0525</text>

      <text x="709" y="396" font-weight="700">Diagnosis relaxed</text>
      <rect x="875" y="377" width="220" height="20" rx="10" fill="#ffe4e6"/>
      <rect x="875" y="377" width="147" height="20" rx="10" fill="#e11d48"/>
      <text x="1128" y="396" text-anchor="end" font-weight="800">0.3333</text>

      <text x="709" y="438" font-weight="700">Certainty</text>
      <rect x="875" y="419" width="220" height="20" rx="10" fill="#f3e8ff"/>
      <rect x="875" y="419" width="198" height="20" rx="10" fill="#9333ea"/>
      <text x="1128" y="438" text-anchor="end" font-weight="800">0.9000</text>
    </g>

    <text x="72" y="510" font-size="13" fill="#64748b">Values are also stored in configs/reported_results.json for script-based comparison.</text>
  </g>
</svg>
